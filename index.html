<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Russia Map</title>
  <style>
    :root {
      color-scheme: light;
      --paper-top: #f4efe3;
      --paper-mid: #d8dfe1;
      --paper-bottom: #9eb0b8;
      --land-top: #6d9ab0;
      --land-bottom: #2f5468;
      --land-stroke: #143242;
      --city: #ef7c5d;
      --city-stroke: #143242;
      --label: #102838;
      --label-halo: rgba(248, 244, 233, 0.92);
      --line: rgba(16, 40, 56, 0.8);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.7), transparent 40%),
        linear-gradient(180deg, var(--paper-top) 0%, var(--paper-mid) 55%, var(--paper-bottom) 100%);
      font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia, serif;
    }

    svg {
      width: min(96vw, 1500px);
      height: auto;
      max-height: 96vh;
      display: block;
    }

    .country {
      fill: url(#landFill);
      stroke: var(--land-stroke);
      stroke-width: 2.4;
      filter: url(#landShadow);
    }

    .leader {
      stroke: var(--line);
      stroke-width: 1.8;
      stroke-linecap: round;
      vector-effect: non-scaling-stroke;
    }

    .marker {
      fill: var(--city);
      stroke: var(--city-stroke);
      stroke-width: 2;
      vector-effect: non-scaling-stroke;
    }

    .marker.featured {
      r: 5.5;
    }

    .label {
      fill: var(--label);
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.015em;
      dominant-baseline: middle;
      paint-order: stroke;
      stroke: var(--label-halo);
      stroke-width: 6px;
      stroke-linejoin: round;
    }
  </style>
</head>

    const svgNS = "http://www.w3.org/2000/svg";
    const cityLayer = document.getElementById("cities");

    for (const city of cities) {
      const group = document.createElementNS(svgNS, "g");

      const line = document.createElementNS(svgNS, "line");
      const lineX = city.anchor === "end" ? city.labelX + 8 : city.labelX - 8;

      line.setAttribute("class", "leader");
      line.setAttribute("x1", city.x);
      line.setAttribute("y1", city.y);
      line.setAttribute("x2", lineX);
      line.setAttribute("y2", city.labelY);

      const dot = document.createElementNS(svgNS, "circle");
      dot.setAttribute("class", city.featured ? "marker featured" : "marker");
      dot.setAttribute("cx", city.x);
      dot.setAttribute("cy", city.y);
      dot.setAttribute("r", city.featured ? "5.5" : "4.4");

      const text = document.createElementNS(svgNS, "text");
      text.setAttribute("class", "label");
      text.setAttribute("x", city.labelX);
      text.setAttribute("y", city.labelY);
      text.setAttribute("text-anchor", city.anchor);
      text.textContent = city.name;

      group.append(line, dot, text);
      cityLayer.append(group);
    }
