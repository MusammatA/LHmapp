<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta
    name="description"
    content="A map of Raskolnikov's locations in Crime and Punishment."
  >
  <title>The Geography of Guilt</title>
  <link rel="stylesheet" href="css/styles.css">
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  >
</head>
<body>
  <main class="map-page is-intro-active" aria-label="Map of Raskolnikov's locations">
    <div class="map-canvas" id="map" aria-label="Map of Raskolnikov's locations"></div>

    <button
      class="intro-screen"
      type="button"
      data-intro-screen
      aria-label="Begin exploring the map"
    >
      <span class="intro-screen__content">
        <span class="intro-screen__title">Welcome to the Journey of Guilt</span>
        <span class="intro-screen__prompt">Click to begin</span>
      </span>
    </button>

    <div class="map-placeholder" data-map-placeholder hidden>
      <h1 data-map-placeholder-title>OpenStreetMap is loading.</h1>
      <p data-map-placeholder-copy>
        This map needs internet access so Leaflet can load the basemap tiles.
      </p>
    </div>
  </main>

  <noscript>
    <div class="noscript-warning">
      This map requires JavaScript.
    </div>
  </noscript>

  <script
    defer
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script defer src="js/data.js"></script>
  <script defer src="js/map.js"></script>
  <script defer src="js/app.js"></script>
</body>
</html>
